<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rally Timing Master</title>
    <style>
        body { background: #111; color: #00ff00; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 50px; }
        .hidden { display: none; }
        .view { display: none; padding: 20px; }
        .view.active { display: block; }
        #central-clock { font-size: 3.5rem; font-weight: bold; margin: 10px 0; color: #fff; }
        #stage-info { font-size: 1.2rem; margin-bottom: 10px; }
        
        .countdown { font-size: 5rem; color: yellow; transition: all 0.3s; padding: 10px; border-radius: 10px; }
        .countdown.go { color: #fff; animation: blink 0.5s infinite; }
        
        button { padding: 15px; margin: 5px; font-size: 1.1rem; cursor: pointer; background: #333; color: #0f0; border: 1px solid #0f0; border-radius: 5px; }
        button:active { background: #555; }
        input { padding: 10px; font-size: 1.2rem; background: #222; color: #0f0; border: 1px solid #444; width: 80%; text-align: center; margin-bottom: 10px; }
        
        nav { background: #222; padding: 10px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-around; }
        nav button { padding: 10px; font-size: 0.9rem; flex: 1; }

        #log { text-align: left; max-height: 300px; overflow-y: auto; border: 1px solid #333; padding: 10px; font-family: monospace; background: #000; margin-top: 10px; }
        
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; max-width: 280px; margin: 10px auto; }
        
        .setup-item { margin: 20px 0; padding: 15px; border: 1px solid #333; border-radius: 8px; }

        .p-btn { background: #444; min-width: 40px; } .p-btn.active { background: yellow; color: black; }

        @keyframes blink { 50% { opacity: 0; } }

        #active-rider-display {
            text-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }
    </style>
</head>
<body>

<nav>
    <button onclick="showView('start')">START</button>
    <button onclick="showView('finish')">CÍL</button>
    <button onclick="showView('results')">LOG</button>
    <button onclick="showView('setup')">NASTAVENÍ</button>
</nav>

<div id="central-clock">00:00:00</div>
<div id="stage-info">Aktuální: <strong>RZ <span id="current-stage-num">1</span></strong></div>

<hr style="border-color: #333;">

<section id="view-start" class="view active">
    <h2>START RZ</h2>
    
    <div id="start-display-box" style="display: flex; justify-content: center; align-items: center; gap: 30px; background: #222; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
        <div>
            <div style="font-size: 1rem; color: #aaa;">JEZDEC</div>
            <div id="active-rider-display" style="font-size: 4rem; font-weight: bold; color: #00ff00;">--</div>
        </div>
        <div>
            <div style="font-size: 1rem; color: #aaa;">START ZA</div>
            <div id="countdown" class="countdown">--</div>
        </div>
    </div>
    
    <div class="rider-area">
        <input type="number" id="riderNumber" readonly placeholder="Číslo jezdce">
        <div class="keypad">
            <button onclick="pressNum(1)">1</button><button onclick="pressNum(2)">2</button><button onclick="pressNum(3)">3</button>
            <button onclick="pressNum(4)">4</button><button onclick="pressNum(5)">5</button><button onclick="pressNum(6)">6</button>
            <button onclick="pressNum(7)">7</button><button onclick="pressNum(8)">8</button><button onclick="pressNum(9)">9</button>
            <button onclick="clearNum()" style="color: #ff4444;">C</button><button onclick="pressNum(0)">0</button>
            <button onclick="clearNum()" style="background: #600; color: #fff;">STOP</button>
        </div>
    </div>
</section>

<section id="view-finish" class="view">
    <h2>CÍL RZ</h2>
    <div style="margin: 40px 0;">
        <button id="finishBtn" style="width: 250px; height: 150px; font-size: 2.5rem; background: #900; color: white; border: 4px solid #f00; border-radius: 20px; font-weight: bold;">PROJETÍ<br>CÍLEM</button>
    </div>
    
    <div id="finishModal" class="hidden" style="background: rgba(0,0,0,0.95); position: fixed; inset: 0; padding: 20px; z-index: 1000;">
        <h2 style="color: #fff; margin-top: 50px;">ČÍSLO JEZDCE V CÍLI:</h2>
        <input type="number" id="finishRiderInput" readonly style="font-size: 3rem; height: 80px; width: 200px; margin-bottom: 20px;">
        <div class="keypad">
            <button onclick="pressNum(1, 'finishRiderInput')">1</button>
            <button onclick="pressNum(2, 'finishRiderInput')">2</button>
            <button onclick="pressNum(3, 'finishRiderInput')">3</button>
            <button onclick="pressNum(4, 'finishRiderInput')">4</button>
            <button onclick="pressNum(5, 'finishRiderInput')">5</button>
            <button onclick="pressNum(6, 'finishRiderInput')">6</button>
            <button onclick="pressNum(7, 'finishRiderInput')">7</button>
            <button onclick="pressNum(8, 'finishRiderInput')">8</button>
            <button onclick="pressNum(9, 'finishRiderInput')">9</button>
            <button onclick="clearNum('finishRiderInput')" style="color: #ff4444;">C</button>
            <button onclick="pressNum(0, 'finishRiderInput')">0</button>
            <button onclick="confirmFinishRider()" style="background: #060; color: #fff; font-weight: bold;">OK</button>
        </div>
        <button onclick="document.getElementById('finishModal').classList.add('hidden')" style="margin-top: 20px; background: #444; border: none;">Zrušit (smaže záznam)</button>
    </div>

    <div style="margin-top: 15px; border-top: 1px solid #444; padding-top: 10px;">
    <div style="font-size: 0.8rem; color: #aaa; margin-bottom: 5px;">PENALIZACE:</div>
    <div id="penalty-selector" style="display: flex; gap: 5px; justify-content: center;">
        <button onclick="setPenalty('A')" class="p-btn">A</button>
        <button onclick="setPenalty('B')" class="p-btn">B</button>
        <button onclick="setPenalty('C')" class="p-btn">C</button>
        <button onclick="setPenalty('')" style="background: #444;">Žádná</button>
    </div>
    <div id="active-penalty-display" style="color: yellow; margin-top: 5px; font-weight: bold;"></div>
</div>

</section>

<section id="view-results" class="view">
    <h2>LOG UDÁLOSTÍ</h2>
    <button onclick="downloadCSV()" style="background: #044; width: 100%; margin-bottom: 15px;">EXPORT DO EXCELU (CSV)</button>
    <div id="log"></div>
</section>

<section id="view-setup" class="view">
    <h2>NASTAVENÍ</h2>
    
    <div class="setup-item">
        <label>ROLE ZAŘÍZENÍ:</label><br>
        <select id="device-role-select" onchange="updateRole(this.value)" style="padding: 10px; font-size: 1.2rem; width: 100%; background: #222; color: #0f0; margin-top: 10px;">
            <option value="unassigned">-- Vyberte roli --</option>
            <option value="START">S - START</option>
            <option value="FINISH">F - CÍL</option>
        </select>
    </div>

    <button id="connectArduino">Připojit Arduino</button>

    <div class="setup-item">
        <label>ČÍSLO RZ:</label><br>
        <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 10px;">
            <button onclick="changeStage(-1)" style="width: 60px;">-</button>
            <span id="setup-stage-num" style="font-size: 2rem; font-weight: bold;">1</span>
            <button onclick="changeStage(1)" style="width: 60px;">+</button>
        </div>
    </div>

    <div class="setup-item">
        <label>INTERVAL STARTŮ (sekundy):</label><br>
        <input type="number" id="startInterval" value="60" style="width: 100px; margin-top: 10px;">
    </div>

    <div class="setup-item">
    <label>KOREKCE ČASU (ms):</label><br>
    <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 10px;">
        <button onclick="adjustOffset(-1000)">-1s</button>
        <button onclick="adjustOffset(-100)">-0.1s</button>
        <span id="current-offset-display" style="font-family: monospace; min-width: 60px;">0</span>
        <button onclick="adjustOffset(100)">+0.1s</button>
        <button onclick="adjustOffset(1000)">+1s</button>
    </div>
    <p style="font-size: 0.8rem; color: #888;">Slouží k synchronizaci s ostatními telefony.</p>
</div>

<div class="setup-item" style="border: 2px solid #600;">
    <label style="color: #ff4444; font-weight: bold;">SPRÁVA DAT:</label><br>
    <button id="clear-data-btn" onclick="confirmClearData()" style="background: #440000; color: #fff; width: 100%; margin-top: 10px;">SMAZAT VŠECHNY LOGY</button>
</div>

</section>

<script src="app.js"></script>
</body>
</html>
